<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q5 — Authorized Access Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: #000;
      color: #9ca3af;
      font-family: 'Open Sans', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    /* LOGIN SCREEN */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    .login-container {
      width: 340px;
      text-align: center;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
      border: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 32px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      background: #0a0a0a;
      border: 1px solid #1a1a2e;
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 14px;
      font-family: 'Open Sans', sans-serif;
      text-align: center;
      direction: ltr;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-input:focus {
      border-color: #7c3aed;
    }

    .login-input.error {
      border-color: #ef4444;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 12px;
      height: 16px;
    }

    .login-attempts {
      color: #4b5563;
      font-size: 11px;
      margin-top: 8px;
    }

    .login-footer {
      position: absolute;
      bottom: 24px;
      font-size: 10px;
      color: #1f2937;
    }

    /* LOCKOUT */
    .lockout-msg {
      color: #ef4444;
      font-size: 13px;
      line-height: 1.6;
    }

    /* SESSION TIMER */
    #session-timer {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 10px;
      color: #374151;
      z-index: 100000;
      display: none;
    }

    /* ANTI-SELECT */
    .no-select {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* APP CONTAINER */
    #app-container {
      display: none;
      width: 100%;
      height: 100%;
    }

    #app-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body class="no-select">

  <!-- SESSION TIMER -->
  <div id="session-timer"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-container">
      <div class="login-logo">&#x2723;</div>
      <div class="login-title">Quantamental v5</div>
      <div class="login-subtitle">Authorized Personnel Only</div>
      
      <form id="login-form" onsubmit="return handleLogin(event)">
        <input 
          type="password" 
          id="password-input" 
          class="login-input" 
          placeholder="&#x1F512; Enter Access Code"
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="login-btn" id="login-btn">
          &#x2192; &#x05DB;&#x05E0;&#x05D9;&#x05E1;&#x05D4;
        </button>
      </form>
      
      <div class="login-error" id="login-error"></div>
      <div class="login-attempts" id="login-attempts"></div>
    </div>
    
    <div class="login-footer">
      &#x00A9; 2026 Q5 System &mdash; All Rights Reserved
    </div>
  </div>

  <!-- APP (hidden until auth) -->
  <div id="app-container"></div>

  <script>
    // ==========================================
    // SECURITY MODULE
    // ==========================================
    
    (function() {
      "use strict";
      
      // --- Config ---
      const HASH = "6070a88c0fc74c0f91fdc7f8a4e587d83a28a96ac6ed9f4e620fa3f03e34b853";
      const MAX_ATTEMPTS = 5;
      const LOCKOUT_MIN = 15;
      const SESSION_TIMEOUT_MIN = 120; // 2 hours
      
      let attempts = 0;
      let lockedUntil = 0;
      let sessionTimer = null;
      
      // --- Anti Dev Tools ---
      function blockDevTools() {
        // Disable right-click
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        
        // Disable common dev shortcuts
        document.addEventListener('keydown', function(e) {
          // F12
          if (e.key === 'F12') { e.preventDefault(); return false; }
          // Ctrl+Shift+I / Cmd+Opt+I
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
          // Ctrl+Shift+J / Cmd+Opt+J
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
          // Ctrl+U / Cmd+U (view source)
          if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); return false; }
          // Ctrl+Shift+C
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
          // Ctrl+S (save)
          if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); return false; }
        });
        
        // Detect DevTools open (debugger trick)
        (function detect() {
          const start = performance.now();
          debugger;
          const end = performance.now();
          if (end - start > 100) {
            document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;background:#000;color:#ef4444;font-size:18px;font-family:sans-serif;direction:rtl;">&#x26A0; &#x05D6;&#x05D5;&#x05D4;&#x05D4; &#x05E4;&#x05E8;&#x05D9;&#x05E6;&#x05EA; &#x05D0;&#x05D1;&#x05D8;&#x05D7;&#x05D4;. &#x05D4;&#x05DE;&#x05E2;&#x05E8;&#x05DB;&#x05EA; &#x05E0;&#x05E0;&#x05E2;&#x05DC;&#x05D4;.</div>';
          }
        })();
      }
      
      // --- SHA-256 Hash ---
      async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }
      
      // --- Login Handler ---
      window.handleLogin = async function(e) {
        e.preventDefault();
        
        const now = Date.now();
        if (now < lockedUntil) {
          const remaining = Math.ceil((lockedUntil - now) / 60000);
          document.getElementById('login-error').textContent = 
            '\u26D4 \u05DE\u05E2\u05E8\u05DB\u05EA \u05E0\u05E2\u05D5\u05DC\u05D4. \u05E0\u05E1\u05D4 \u05E9\u05D5\u05D1 \u05D1\u05E2\u05D5\u05D3 ' + remaining + ' \u05D3\u05E7\u05D5\u05EA';
          return false;
        }
        
        const input = document.getElementById('password-input');
        const password = input.value;
        
        if (!password) return false;
        
        const hash = await sha256(password);
        
        if (hash === HASH) {
          // SUCCESS
          attempts = 0;
          unlockApp();
        } else {
          // FAIL
          attempts++;
          input.classList.add('error');
          setTimeout(() => input.classList.remove('error'), 500);
          input.value = '';
          
          document.getElementById('login-error').textContent = '\u274C \u05E7\u05D5\u05D3 \u05E9\u05D2\u05D5\u05D9';
          document.getElementById('login-attempts').textContent = 
            '\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF ' + attempts + ' \u05DE\u05EA\u05D5\u05DA ' + MAX_ATTEMPTS;
          
          if (attempts >= MAX_ATTEMPTS) {
            lockedUntil = Date.now() + LOCKOUT_MIN * 60000;
            document.getElementById('login-error').textContent = 
              '\u26D4 \u05E0\u05E0\u05E2\u05DC \u05DC-' + LOCKOUT_MIN + ' \u05D3\u05E7\u05D5\u05EA';
            document.getElementById('login-btn').disabled = true;
            setTimeout(() => {
              document.getElementById('login-btn').disabled = false;
              document.getElementById('login-error').textContent = '';
              attempts = 0;
            }, LOCKOUT_MIN * 60000);
          }
        }
        
        return false;
      };
      
      // --- Unlock App ---
      function unlockApp() {
        document.getElementById('login-screen').style.display = 'none';
        const container = document.getElementById('app-container');
        container.style.display = 'block';
        document.body.style.overflow = 'auto';
        
        // Decode and inject the app
        try {
          const encoded = window.__Q5_PAYLOAD;
          const decoded = atob(encoded);
          const bytes = new Uint8Array(decoded.length);
          for (let i = 0; i < decoded.length; i++) {
            bytes[i] = decoded.charCodeAt(i);
          }
          const html = new TextDecoder('utf-8').decode(bytes);
          
          // Use srcdoc iframe for isolation
          const iframe = document.createElement('iframe');
          iframe.srcdoc = html;
          iframe.style.cssText = 'width:100%;height:100vh;border:none;';
          iframe.sandbox = 'allow-scripts allow-same-origin';
          container.appendChild(iframe);
          
          // Clean payload from memory
          delete window.__Q5_PAYLOAD;
          
        } catch(err) {
          container.innerHTML = '<div style="padding:40px;color:#ef4444;">\u05E9\u05D2\u05D9\u05D0\u05D4 \u05D1\u05D8\u05E2\u05D9\u05E0\u05EA \u05D4\u05DE\u05E2\u05E8\u05DB\u05EA</div>';
        }
        
        // Session timeout
        const timerEl = document.getElementById('session-timer');
        timerEl.style.display = 'block';
        let remaining = SESSION_TIMEOUT_MIN * 60;
        
        sessionTimer = setInterval(() => {
          remaining--;
          const min = Math.floor(remaining / 60);
          const sec = remaining % 60;
          timerEl.textContent = '\u23F1 ' + min + ':' + String(sec).padStart(2,'0');
          
          if (remaining <= 300) timerEl.style.color = '#ef4444';
          
          if (remaining <= 0) {
            clearInterval(sessionTimer);
            location.reload(); // Force re-login
          }
        }, 1000);
      }
      
      // --- Init ---
      blockDevTools();
      
      // Enter key support
      document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('password-input').focus();
      });
      
    })();
  </script>
