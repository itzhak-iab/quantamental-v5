<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q5 — Authorized Access Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #F8FAFC;
      color: #0F172A;
      font-family: 'Inter', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    /* LOGIN SCREEN */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #F8FAFC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }
    .login-container {
      width: 360px;
      text-align: center;
    }
    .login-logo {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: #0F172A;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: white;
      box-shadow: 0 4px 16px rgba(15,23,42,0.15);
    }
    .login-title {
      font-family: 'Merriweather', serif;
      font-size: 22px; font-weight: 700;
      color: #0F172A; margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px; color: #64748B; margin-bottom: 32px;
    }
    .form-field {
      position: relative; margin-bottom: 16px;
    }
    .form-field input {
      width: 100%; padding: 14px 16px;
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: 14px; color: #0F172A;
      font-family: 'Inter', sans-serif;
      direction: ltr; text-align: center;
      letter-spacing: 2px;
      transition: border-color 0.2s;
    }
    .form-field input:focus {
      outline: none; border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-field input.error {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    .login-btn {
      width: 100%; padding: 14px;
      background: #0F172A; color: white;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-msg {
      font-size: 12px; color: #EF4444;
      margin-top: 12px; min-height: 18px;
    }
    .lockout-msg {
      font-size: 13px; color: #B91C1C;
      background: #FEF2F2; padding: 12px 16px;
      border-radius: 8px; margin-top: 16px;
    }
    .footer-note {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: #94A3B8;
    }

    /* SESSION BAR */
    #session-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      height: 3px; background: #E2E8F0; z-index: 99998;
    }
    #session-progress {
      height: 100%; background: #2563EB;
      transition: width 1s linear;
    }
    #session-timer {
      display: none; position: fixed; top: 8px; left: 16px;
      font-size: 11px; color: #64748B; z-index: 99998;
      font-feature-settings: "tnum";
    }

    /* APP FRAME */
    #app-frame {
      display: none; position: fixed; inset: 0;
      border: none; width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-container">
      <div class="login-logo">Q5</div>
      <div class="login-title">Q5 Institutional</div>
      <div class="login-sub">Authorized Personnel Only</div>
      <div class="form-field">
        <input type="password" id="pwd" placeholder="Access Code" autocomplete="off"
          onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Authenticate</button>
      <div class="error-msg" id="error-msg"></div>
      <div id="lockout-box"></div>
    </div>
  </div>
  <div class="footer-note">Institutional Use Only &middot; All sessions are logged</div>

  <!-- SESSION -->
  <div id="session-bar"><div id="session-progress" style="width:100%"></div></div>
  <div id="session-timer"></div>

    let attempts = 0;
    let lockUntil = 0;
    let sessionEnd = 0;
    let sessionTimer = null;

    // ===== ANTI-DEVTOOLS =====
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12') e.preventDefault();
      if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) e.preventDefault();
      if (e.ctrlKey && e.key.toUpperCase() === 'U') e.preventDefault();
    });
    document.addEventListener('contextmenu', e => e.preventDefault());

    (function antiDebug() {
      const threshold = 160;
      setInterval(() => {
        const w = window.outerWidth - window.innerWidth > threshold;
        const h = window.outerHeight - window.innerHeight > threshold;
        if (w || h) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#64748B;background:#F8FAFC;">Session terminated — developer tools detected</div>';
        }
      }, 2000);
    })();

    // ===== SHA-256 =====
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ===== LOGIN =====
    async function doLogin() {
      const now = Date.now();
      if (now < lockUntil) {
        const left = Math.ceil((lockUntil - now) / 60000);
        document.getElementById('lockout-box').innerHTML =
          '<div class="lockout-msg">Account locked. Try again in ' + left + ' minutes.</div>';
        return;
      }

      const pwd = document.getElementById('pwd').value;
      if (!pwd) return;

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      const hash = await sha256(pwd);

      if (hash === HASH) {
        attempts = 0;
        startSession();
      } else {
        attempts++;
        const input = document.getElementById('pwd');
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 1500);

        if (attempts >= MAX_ATTEMPTS) {
          lockUntil = now + LOCKOUT_TIME;
          document.getElementById('lockout-box').innerHTML =
            '<div class="lockout-msg">Too many attempts. Locked for 15 minutes.</div>';
          document.getElementById('error-msg').textContent = '';
        } else {
          document.getElementById('error-msg').textContent =
            'Invalid code (' + (MAX_ATTEMPTS - attempts) + ' attempts remaining)';
        }
        btn.disabled = false;
        btn.textContent = 'Authenticate';
      }
    }

    // ===== SESSION =====
    function startSession() {
      document.getElementById('login-screen').style.display = 'none';
      document.querySelector('.footer-note').style.display = 'none';

      // Decode and load app
      const bytes = Uint8Array.from(atob(PAYLOAD), c => c.charCodeAt(0));
      const html = new TextDecoder('utf-8').decode(bytes);
      const frame = document.getElementById('app-frame');
      frame.style.display = 'block';
      frame.srcdoc = html;

      // Session timer
      sessionEnd = Date.now() + SESSION_DURATION;
      document.getElementById('session-bar').style.display = 'block';
      document.getElementById('session-timer').style.display = 'block';

      sessionTimer = setInterval(updateSessionTimer, 1000);
      updateSessionTimer();
    }

    function updateSessionTimer() {
      const remaining = sessionEnd - Date.now();
      if (remaining <= 0) {
        clearInterval(sessionTimer);
        endSession();
        return;
      }
      const hrs = Math.floor(remaining / 3600000);
      const mins = Math.floor((remaining % 3600000) / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      const str = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      document.getElementById('session-timer').textContent = 'Session: ' + str;

      const pct = (remaining / SESSION_DURATION) * 100;
      document.getElementById('session-progress').style.width = pct + '%';
      if (pct < 10) document.getElementById('session-progress').style.background = '#EF4444';
      else if (pct < 25) document.getElementById('session-progress').style.background = '#F59E0B';
    }

    function endSession() {
      document.getElementById('app-frame').srcdoc = '';
      document.getElementById('app-frame').style.display = 'none';
      document.getElementById('session-bar').style.display = 'none';
      document.getElementById('session-timer').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.querySelector('.footer-note').style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('error-msg').textContent = 'Session expired. Please re-authenticate.';
    }
  </script>
