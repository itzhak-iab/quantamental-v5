name: Daily Macro Agent Run

on:
  schedule:
    - cron: '0 2 * * 1-5'   # Mon-Fri at 02:00 UTC (04:00 Israel time)
  workflow_dispatch:          # Manual trigger button

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Macro Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python macro_agent.py

    - name: Commit and push updated data
      run: |
        git config --global user.name "Q5-Bot"
        git config --global user.email "q5-bot@users.noreply.github.com"
        git add dashboard_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update macro dashboard data $(date -u +%Y-%m-%d)" && git push)
